<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="claudeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#2a2520"/>
      <stop offset="100%" style="stop-color:#1f1b18"/>
    </linearGradient>
    <linearGradient id="claudeAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#E8C9A0"/>
    </linearGradient>
    <filter id="claudeGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#claudeBg)"/>
  <rect x="0" y="296" width="900" height="4" fill="url(#claudeAccent)"/>
  <!-- Minimalist AI circle -->
  <circle cx="130" cy="150" r="55" fill="none" stroke="#D4A574" stroke-width="2" opacity="0.7"/>
  <circle cx="130" cy="150" r="40" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.4"/>
  <circle cx="130" cy="150" r="12" fill="#D4A574" opacity="0.6"/>
  <!-- Orbital dots -->
  <circle cx="130" cy="95" r="4" fill="#D4A574" opacity="0.8"/>
  <circle cx="175" cy="130" r="3" fill="#E8C9A0" opacity="0.6"/>
  <circle cx="85" cy="170" r="3" fill="#E8C9A0" opacity="0.5"/>
  <!-- Desktop window outline -->
  <rect x="60" y="220" rx="4" ry="4" width="140" height="55" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.3"/>
  <rect x="60" y="220" width="140" height="14" rx="4" ry="0" fill="#D4A574" opacity="0.1"/>
  <circle cx="72" cy="227" r="3" fill="#D4A574" opacity="0.4"/>
  <circle cx="82" cy="227" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="92" cy="227" r="3" fill="#D4A574" opacity="0.2"/>
  <!-- Title -->
  <text x="280" y="120" font-family="Segoe UI, Arial" font-size="40" font-weight="bold" fill="#FFFFFF">Claude AI Desktop</text>
  <text x="280" y="168" font-family="Segoe UI, Arial" font-size="36" font-weight="300" fill="#D4A574">Free App</text>
  <!-- Feature pills -->
  <rect x="280" y="192" rx="12" ry="12" width="120" height="26" fill="#D4A574" opacity="0.15"/>
  <text x="340" y="210" font-family="Segoe UI" font-size="11" fill="#D4A574" text-anchor="middle">System Tray</text>
  <rect x="410" y="192" rx="12" ry="12" width="120" height="26" fill="#D4A574" opacity="0.15"/>
  <text x="470" y="210" font-family="Segoe UI" font-size="11" fill="#D4A574" text-anchor="middle">Hotkeys</text>
  <rect x="540" y="192" rx="12" ry="12" width="130" height="26" fill="#D4A574" opacity="0.15"/>
  <text x="605" y="210" font-family="Segoe UI" font-size="11" fill="#D4A574" text-anchor="middle">Templates</text>
  <rect x="680" y="192" rx="12" ry="12" width="110" height="26" fill="#D4A574" opacity="0.15"/>
  <text x="735" y="210" font-family="Segoe UI" font-size="11" fill="#D4A574" text-anchor="middle">Export</text>
  <!-- Version -->
  <rect x="755" y="25" rx="10" ry="10" width="120" height="28" fill="#D4A574" opacity="0.2"/>
  <text x="815" y="44" font-family="Segoe UI" font-size="13" fill="#E8C9A0" text-anchor="middle">v1.5.0 Free</text>
  <!-- Anthropic subtle -->
  <text x="280" y="265" font-family="Segoe UI" font-size="12" fill="#D4A574" opacity="0.4">Powered by Anthropic's Claude AI</text>
</svg>
